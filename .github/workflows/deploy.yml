name: Build & Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality-gate:
    name: Lint, Test & Coverage
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4.3.0
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Run tests with coverage
        run: pnpm test:coverage
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}

  build-and-push:
    name: Build & Push to GHCR
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: quality-gate

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            VITE_AUTH_PROVIDER=firebase
            VITE_POSTHOG_API_KEY=${{ secrets.VITE_POSTHOG_API_KEY }}
            VITE_POSTHOG_HOST=https://t.botmem.xyz
            VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
            VITE_FIREBASE_AUTH_DOMAIN=botmem-app.firebaseapp.com
            VITE_FIREBASE_PROJECT_ID=botmem-app
            VITE_FIREBASE_STORAGE_BUCKET=botmem-app.firebasestorage.app
            VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
            VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
          tags: |
            ghcr.io/botmem/botmem:latest
            ghcr.io/botmem/botmem:${{ github.sha }}
          platforms: linux/amd64,linux/arm64

  deploy:
    name: Deploy to Production
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4.3.0
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install docs dependencies
        run: cd docs && pnpm install --frozen-lockfile

      - name: Build docs
        run: cd docs && pnpm build

      - name: Pull & restart api on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: 65.20.85.57
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_ACTOR
          script: |
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_ACTOR" --password-stdin
            cd /opt/botmem
            docker compose -f docker-compose.prod.yml pull api
            docker compose -f docker-compose.prod.yml up -d api
            docker image prune -af
            docker builder prune -af
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_ACTOR: ${{ github.actor }}

      - name: Deploy docs to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 65.20.85.57
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: docs/.vitepress/dist/*
          target: /opt/botmem/docs-site
          strip_components: 3
          overwrite: true
          rm: true

      - name: Validate deployment
        run: |
          for i in $(seq 1 12); do
            STATUS=$(curl -sf https://botmem.xyz/api/version | python3 -c "import sys,json; d=json.load(sys.stdin); print('ok')" 2>/dev/null || echo "fail")
            if [ "$STATUS" = "ok" ]; then
              echo "Deployment validated — API is healthy (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: not ready yet, waiting 5s..."
            sleep 5
          done
          echo "API health check failed after 60s" && exit 1

      - name: Validate docs
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://docs.botmem.xyz/)
          if [ "$STATUS" = "200" ]; then
            echo "Docs site is live at https://docs.botmem.xyz/"
          else
            echo "Warning: docs.botmem.xyz returned HTTP $STATUS"
          fi

  release:
    name: Tag & GitHub Release
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: deploy
    outputs:
      version: ${{ steps.version.outputs.tag }}
    permissions:
      contents: write

    steps:
      - name: Checkout with full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine next version
        id: version
        run: |
          git fetch --tags
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$LATEST_TAG" ]; then
            NEXT="v0.1.0"
            PREV_REF=$(git rev-list --max-parents=0 HEAD)
          else
            PREV_REF="$LATEST_TAG"
            IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST_TAG#v}"

            # Check commit messages for version bump signals
            COMMITS=$(git log "$LATEST_TAG"..HEAD --pretty=format:"%s")
            if echo "$COMMITS" | grep -qiE "^(feat|feature)(\(.+\))?!:|BREAKING CHANGE"; then
              MINOR=$((MINOR + 1))
              PATCH=0
            elif echo "$COMMITS" | grep -qiE "^feat(\(.+\))?:"; then
              MINOR=$((MINOR + 1))
              PATCH=0
            else
              PATCH=$((PATCH + 1))
            fi
            NEXT="v${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"
          echo "prev=$PREV_REF" >> "$GITHUB_OUTPUT"
          echo "Next version: $NEXT (previous: $PREV_REF)"

      - name: Generate changelog
        id: changelog
        run: |
          PREV="${{ steps.version.outputs.prev }}"
          {
            echo "## What's Changed"
            echo ""

            # Features
            FEATS=$(git log "$PREV"..HEAD --pretty=format:"- %s (%h)" --grep="^feat" -i)
            if [ -n "$FEATS" ]; then
              echo "### Features"
              echo "$FEATS"
              echo ""
            fi

            # Fixes
            FIXES=$(git log "$PREV"..HEAD --pretty=format:"- %s (%h)" --grep="^fix" -i)
            if [ -n "$FIXES" ]; then
              echo "### Bug Fixes"
              echo "$FIXES"
              echo ""
            fi

            # Other changes
            OTHER=$(git log "$PREV"..HEAD --pretty=format:"- %s (%h)" --invert-grep --grep="^feat" --grep="^fix" -i)
            if [ -n "$OTHER" ]; then
              echo "### Other Changes"
              echo "$OTHER"
              echo ""
            fi

            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV}...${{ steps.version.outputs.tag }}"
          } > /tmp/changelog.md
          cat /tmp/changelog.md

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git tag "$TAG" "${{ github.sha }}"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file /tmp/changelog.md \
            --target "${{ github.sha }}"

  publish-cli:
    name: Publish @botmem/cli to npm
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: build-and-push
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout with full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4.3.0
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI
        run: pnpm --filter @botmem/cli build

      - name: Determine version and publish
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          git fetch --tags
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$LATEST_TAG" ]; then
            VERSION="0.1.0"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST_TAG#v}"
            COMMITS=$(git log "$LATEST_TAG"..HEAD --pretty=format:"%s")
            if echo "$COMMITS" | grep -qiE "^(feat|feature)(\(.+\))?!:|BREAKING CHANGE"; then
              MINOR=$((MINOR + 1)); PATCH=0
            elif echo "$COMMITS" | grep -qiE "^feat(\(.+\))?:"; then
              MINOR=$((MINOR + 1)); PATCH=0
            else
              PATCH=$((PATCH + 1))
            fi
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "Publishing CLI version: $VERSION"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

          # Skip publish if this version already exists on npm
          if npm view "@botmem/cli@$VERSION" version 2>/dev/null; then
            echo "Version $VERSION already published — skipping"
          else
            npm publish --access public --tag latest
          fi
