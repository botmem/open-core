name: Build & Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  quality-gate:
    name: Lint, Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # TODO: re-enable lint after fixing all lint errors
      # - name: Lint
      #   run: pnpm lint

      - name: Run tests with coverage
        run: pnpm test:coverage
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}

  publish-cli:
    name: Publish @botmem/cli to npm
    runs-on: ubuntu-latest
    needs: quality-gate
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI
        run: pnpm --filter @botmem/cli build

      - name: Check if version changed
        id: version-check
        working-directory: packages/cli
        run: |
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED_VERSION=$(npm view @botmem/cli version 2>/dev/null || echo "0.0.0")
          echo "local=$LOCAL_VERSION" >> "$GITHUB_OUTPUT"
          echo "published=$PUBLISHED_VERSION" >> "$GITHUB_OUTPUT"
          if [ "$LOCAL_VERSION" != "$PUBLISHED_VERSION" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.version-check.outputs.changed == 'true'
        working-directory: packages/cli
        run: npm publish --provenance --access public

  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    needs: quality-gate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            VITE_POSTHOG_API_KEY=${{ secrets.VITE_POSTHOG_API_KEY }}
            VITE_POSTHOG_HOST=https://eu.i.posthog.com
            VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
            VITE_FIREBASE_AUTH_DOMAIN=botmem-app.firebaseapp.com
            VITE_FIREBASE_PROJECT_ID=botmem-app
            VITE_FIREBASE_STORAGE_BUCKET=botmem-app.firebasestorage.app
            VITE_FIREBASE_MESSAGING_SENDER_ID=958102222848
            VITE_FIREBASE_APP_ID=1:958102222848:web:1ced1d9c98222557ebc0e5
            VITE_FIREBASE_MEASUREMENT_ID=G-VY98K4Q9FJ
          tags: |
            ghcr.io/botmem/open-core:latest
            ghcr.io/botmem/open-core:${{ github.sha }}
          cache-from: |
            type=gha
            type=registry,ref=ghcr.io/botmem/open-core:cache
          cache-to: |
            type=gha,mode=max
            type=registry,ref=ghcr.io/botmem/open-core:cache,mode=max
          platforms: linux/amd64

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Pull & restart api on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: 65.20.85.57
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_ACTOR
          script: |
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_ACTOR" --password-stdin
            cd /opt/botmem
            docker compose -f docker-compose.prod.yml pull api
            docker compose -f docker-compose.prod.yml up -d api
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_ACTOR: ${{ github.actor }}

      - name: Validate deployment
        run: |
          for i in $(seq 1 12); do
            STATUS=$(curl -sf https://botmem.xyz/api/version | python3 -c "import sys,json; d=json.load(sys.stdin); print('ok')" 2>/dev/null || echo "fail")
            if [ "$STATUS" = "ok" ]; then
              echo "Deployment validated — API is healthy (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: not ready yet, waiting 5s..."
            sleep 5
          done
          echo "API health check failed after 60s" && exit 1
