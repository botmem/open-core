name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}-${{ github.actor }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  gate:
    name: Deployment Gate
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Check for open Dependabot PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OPEN_DEPENDABOT_PRS=$(gh pr list --repo "${{ github.repository }}" --author "app/dependabot" --state open --json number,title --jq 'length')
          if [ "$OPEN_DEPENDABOT_PRS" -gt 0 ]; then
            echo "WARNING: $OPEN_DEPENDABOT_PRS open Dependabot PR(s) — merge or close them."
            gh pr list --repo "${{ github.repository }}" --author "app/dependabot" --state open --json number,title --jq '.[] | "  - PR #\(.number): \(.title)"'
          fi

  version:
    name: Determine Version
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [gate]
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      prev: ${{ steps.version.outputs.prev }}

    steps:
      - name: Checkout with full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine next version
        id: version
        run: |
          git fetch --tags
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$LATEST_TAG" ]; then
            NEXT="v0.1.0"
            PREV_REF=$(git rev-list --max-parents=0 HEAD)
          else
            PREV_REF="$LATEST_TAG"
            IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST_TAG#v}"

            COMMITS=$(git log "$LATEST_TAG"..HEAD --pretty=format:"%s")
            if echo "$COMMITS" | grep -qiE "^(feat|feature)(\(.+\))?!:|BREAKING CHANGE"; then
              MINOR=$((MINOR + 1))
              PATCH=0
            elif echo "$COMMITS" | grep -qiE "^feat(\(.+\))?:"; then
              MINOR=$((MINOR + 1))
              PATCH=0
            else
              PATCH=$((PATCH + 1))
            fi
            NEXT="v${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"
          echo "version=${NEXT#v}" >> "$GITHUB_OUTPUT"
          echo "prev=$PREV_REF" >> "$GITHUB_OUTPUT"
          echo "Next version: $NEXT (previous: $PREV_REF)"

  quality-gate:
    name: Lint & Test
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4.4.0
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Lint
        run: pnpm lint

      - name: Run tests with coverage
        run: pnpm test:coverage
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}

  build-amd64:
    name: Build & Push (amd64)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [version, quality-gate]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image (amd64)
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            VITE_AUTH_PROVIDER=firebase
            VITE_POSTHOG_API_KEY=${{ secrets.VITE_POSTHOG_API_KEY }}
            VITE_POSTHOG_HOST=https://t.botmem.xyz
            VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
            VITE_FIREBASE_AUTH_DOMAIN=botmem-app.firebaseapp.com
            VITE_FIREBASE_PROJECT_ID=botmem-app
            VITE_FIREBASE_STORAGE_BUCKET=botmem-app.firebasestorage.app
            VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
            VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
          tags: |
            ghcr.io/botmem/botmem:amd64-${{ needs.version.outputs.tag }}
          platforms: linux/amd64

  build-arm64:
    name: Build (arm64)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [version, quality-gate]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image (arm64)
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            VITE_AUTH_PROVIDER=firebase
            VITE_POSTHOG_API_KEY=${{ secrets.VITE_POSTHOG_API_KEY }}
            VITE_POSTHOG_HOST=https://t.botmem.xyz
            VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
            VITE_FIREBASE_AUTH_DOMAIN=botmem-app.firebaseapp.com
            VITE_FIREBASE_PROJECT_ID=botmem-app
            VITE_FIREBASE_STORAGE_BUCKET=botmem-app.firebasestorage.app
            VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
            VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
          tags: |
            ghcr.io/botmem/botmem:arm64-${{ needs.version.outputs.tag }}
          platforms: linux/arm64

  create-manifest:
    name: Create Multi-Arch Manifest
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [version, build-amd64, build-arm64]

    steps:
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          # buildx imagetools handles manifest-list sources (from build-push-action)
          docker buildx imagetools create -t ghcr.io/botmem/botmem:${TAG} \
            ghcr.io/botmem/botmem:amd64-${TAG} \
            ghcr.io/botmem/botmem:arm64-${TAG}
          docker buildx imagetools create -t ghcr.io/botmem/botmem:latest \
            ghcr.io/botmem/botmem:amd64-${TAG} \
            ghcr.io/botmem/botmem:arm64-${TAG}

  deploy:
    name: Deploy to Production
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [version, create-manifest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check if docs changed
        id: docs-check
        run: |
          if git diff --name-only ${{ github.event.before }} HEAD | grep -q '^docs/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install pnpm
        if: steps.docs-check.outputs.changed == 'true'
        uses: pnpm/action-setup@v4.4.0
        with:
          version: 9.15.0

      - name: Setup Node.js
        if: steps.docs-check.outputs.changed == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install docs dependencies
        if: steps.docs-check.outputs.changed == 'true'
        run: cd docs && pnpm install --frozen-lockfile

      - name: Build docs
        if: steps.docs-check.outputs.changed == 'true'
        run: cd docs && pnpm build
        env:
          VITE_POSTHOG_API_KEY: ${{ secrets.VITE_POSTHOG_API_KEY }}
          VITE_POSTHOG_HOST: https://t.botmem.xyz

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          args: --login-server=${{ secrets.TAILSCALE_LOGIN_SERVER }}
          hostname: github-ci-${{ github.run_id }}

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_TAILSCALE_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy versioned image to VPS
        timeout-minutes: 10
        env:
          IMAGE_TAG: ${{ needs.version.outputs.tag }}
        run: |
          SSH_OPTS="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=30 -o ServerAliveInterval=10 -o ServerAliveCountMax=3"
          ssh $SSH_OPTS root@${{ secrets.VPS_TAILSCALE_HOST }} << DEPLOY
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            cd /opt/botmem

            # Update compose to use the versioned image tag
            sed -i 's|image: ghcr.io/botmem/botmem:.*|image: ghcr.io/botmem/botmem:${IMAGE_TAG}|' docker-compose.prod.yml

            docker compose -f docker-compose.prod.yml pull api
            docker compose -f docker-compose.prod.yml up -d api
            docker image prune -af --filter "until=24h"
            echo "Deployed image: ghcr.io/botmem/botmem:${IMAGE_TAG}"
          DEPLOY

      - name: Deploy docs to VPS
        if: steps.docs-check.outputs.changed == 'true'
        timeout-minutes: 5
        run: |
          SSH_OPTS="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=30 -o ServerAliveInterval=10 -o ServerAliveCountMax=3"
          ssh $SSH_OPTS root@${{ secrets.VPS_TAILSCALE_HOST }} 'rm -rf /opt/botmem/docs-site/* && mkdir -p /opt/botmem/docs-site'
          scp $SSH_OPTS -r docs/.vitepress/dist/* root@${{ secrets.VPS_TAILSCALE_HOST }}:/opt/botmem/docs-site/

      - name: Validate deployment
        env:
          EXPECTED_VERSION: ${{ needs.version.outputs.tag }}
        run: |
          for i in $(seq 1 12); do
            RESPONSE=$(curl -sf https://botmem.xyz/api/version 2>/dev/null || echo "")
            if [ -n "$RESPONSE" ]; then
              echo "Deployment validated — API is healthy (attempt $i)"
              echo "Response: $RESPONSE"
              exit 0
            fi
            echo "Attempt $i: not ready yet, waiting 5s..."
            sleep 5
          done
          echo "API health check failed after 60s" && exit 1

      - name: Validate docs
        if: steps.docs-check.outputs.changed == 'true'
        continue-on-error: true
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://docs.botmem.xyz/)
          if [ "$STATUS" = "200" ]; then
            echo "Docs site is live at https://docs.botmem.xyz/"
          else
            echo "Warning: docs.botmem.xyz returned HTTP $STATUS"
          fi

  release:
    name: Tag & GitHub Release
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [version, deploy]
    permissions:
      contents: write

    steps:
      - name: Checkout with full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          PREV="${{ needs.version.outputs.prev }}"
          {
            echo "## What's Changed"
            echo ""

            # Features
            FEATS=$(git log "$PREV"..HEAD --pretty=format:"- %s (%h)" --grep="^feat" -i)
            if [ -n "$FEATS" ]; then
              echo "### Features"
              echo "$FEATS"
              echo ""
            fi

            # Fixes
            FIXES=$(git log "$PREV"..HEAD --pretty=format:"- %s (%h)" --grep="^fix" -i)
            if [ -n "$FIXES" ]; then
              echo "### Bug Fixes"
              echo "$FIXES"
              echo ""
            fi

            # Other changes
            OTHER=$(git log "$PREV"..HEAD --pretty=format:"- %s (%h)" --invert-grep --grep="^feat" --grep="^fix" -i)
            if [ -n "$OTHER" ]; then
              echo "### Other Changes"
              echo "$OTHER"
              echo ""
            fi

            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV}...${{ needs.version.outputs.tag }}"
          } > /tmp/changelog.md
          cat /tmp/changelog.md

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          git tag "$TAG" "${{ github.sha }}"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file /tmp/changelog.md \
            --target "${{ github.sha }}"

  publish-npm:
    name: Publish packages to npm
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [version, deploy]
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4.4.0
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish @botmem/cli
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          pnpm build
          VERSION="${{ needs.version.outputs.version }}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          if npm view "@botmem/cli@$VERSION" version 2>/dev/null; then
            echo "Version $VERSION already published — skipping"
          else
            npm publish --access public --tag latest
          fi

      - name: Build and publish @botmem/openclaw-plugin
        working-directory: packages/openclaw-plugin
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          pnpm build
          VERSION="${{ needs.version.outputs.version }}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          if npm view "@botmem/openclaw-plugin@$VERSION" version 2>/dev/null; then
            echo "Version $VERSION already published — skipping"
          else
            npm publish --access public --tag latest
          fi
