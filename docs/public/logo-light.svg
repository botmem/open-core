<svg viewBox="0 0 210 52" xmlns="http://www.w3.org/2000/svg" fill="none" role="img" aria-label="Botmem logo (light)">
  <!--
    Botmem Logo — Horizontal (light bg variant)
    Shadow: 4px hard dark offset
    Mark bg: #0D0D0D (stays dark for contrast)
  -->

  <!-- Hard dark shadow -->
  <rect x="4" y="4" width="44" height="44" fill="#0D0D0D"/>

  <!-- Outer frame -->
  <rect x="0" y="0" width="44" height="44" fill="#0D0D0D" stroke="#0D0D0D" stroke-width="2"/>

  <!-- Row 1 -->
  <rect x="5"  y="5"  width="10" height="10" fill="#C4F53A"/>
  <rect x="17" y="5"  width="10" height="10" fill="#C4F53A"/>
  <rect x="29" y="5"  width="10" height="10" fill="#1A1A2E" stroke="#555577" stroke-width="1"/>

  <!-- Row 2 -->
  <rect x="5"  y="17" width="10" height="10" fill="#1A1A2E" stroke="#555577" stroke-width="1"/>
  <rect x="17" y="17" width="10" height="10" fill="#C4F53A"/>
  <rect x="29" y="17" width="10" height="10" fill="#1A1A2E" stroke="#555577" stroke-width="1"/>

  <!-- Row 3 -->
  <rect x="5"  y="29" width="10" height="10" fill="#C4F53A"/>
  <rect x="17" y="29" width="10" height="10" fill="#1A1A2E" stroke="#555577" stroke-width="1"/>
  <rect x="29" y="29" width="10" height="10" fill="#C4F53A"/>

  <!-- Wordmark on light bg -->
  <text
    x="58"
    y="33"
    font-family="'Space Mono', 'IBM Plex Mono', 'Courier New', monospace"
    font-size="22"
    font-weight="700"
    letter-spacing="0"
  >
    <tspan fill="#555555">BOT</tspan><tspan fill="#0D0D0D">MEM</tspan>
  </text>
</svg>
