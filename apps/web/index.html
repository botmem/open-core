    <link rel="apple-touch-icon" sizes="192x192" href="/brand/logo-mark-192.png" />
    <!-- Anti-flash: read stored/system theme and apply before React renders -->
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('botmem-theme');
          var pref = raw ? (JSON.parse(raw).state || {}).theme : null;
          var dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var resolved = pref === 'light' ? 'light' : pref === 'dark' ? 'dark' : dark ? 'dark' : 'light';
          document.documentElement.setAttribute('data-theme', resolved);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
